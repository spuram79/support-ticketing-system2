version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: ticketing_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    networks:
      - ticketing-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ticketing_redis
    ports:
      - '6379:6379'
    networks:
      - ticketing-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ticketing_backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ticketing
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-key-change-in-production
      - PORT=3001
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    ports:
      - '3001:3001'
    networks:
      - ticketing-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketing_frontend
    ports:
      - '3000:3000'
    networks:
      - ticketing-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ticketing-network:
    driver: bridge